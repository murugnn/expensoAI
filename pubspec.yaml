name: expenso
description: "Introducing EXPENSO, a sleek AI-powered expense tracker app designed to help you effortlessly manage your finances with a modern Material 3 interface and insightful AI analysis."
publish_to: "none"
version: 3.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  shared_preferences: ^2.0.0
  intl: ^0.20.2
  url_launcher: ^6.2.5
  package_info_plus: ^9.0.0
  version: ^3.0.2
  supabase_flutter: ^2.3.0
  uuid: ^4.4.2
  flutter_markdown: ^0.6.22
  pdf: ^3.11.1
  printing: ^5.13.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4


  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Networking (for AI API)
  http: ^1.2.0
  flutter_dotenv: ^6.0.0
  home_widget: ^0.9.0
  connectivity_plus: ^7.0.0
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.15.0
  tutorial_coach_mark: ^1.3.3
  app_links: ^6.4.1
  share_plus: ^12.0.1
  
  # Updater
  dio: ^5.7.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  open_filex: ^4.5.0
  csv: ^7.1.0

  # Niva Voice Assistant
  vapi: ^0.1.0
  rive: ^0.13.12
  speech_to_text: ^7.3.0
  flutter_animate: ^4.5.2
  lucide_icons: ^0.257.0
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/rive/
    - .env
    - assets/
    - assets/images/
    - assets/images/avatars/
    - assets/images/walkthrough/
    - assets/icons/
    - assets/fonts/
    - assets/images/ai/
    - assets/images/pins/
    - assets/images/game/

  fonts:
    - family: Ndot
      fonts:
        - asset: assets/fonts/Ndot.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/logo.png
  remove_alpha_ios: true

  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: assets/icons/logo.png

dependency_overrides:
  vapi:
    path: ./vapi_patched
